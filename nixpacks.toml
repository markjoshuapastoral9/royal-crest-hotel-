[phases.setup]
nixPkgs = ['php82', 'php82Packages.composer', 'nodejs_20']

[phases.install]
cmds = ['composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader']

[phases.build]
cmds = [
    'npm ci --prefer-offline --no-audit',
    'npm run build',
    'php artisan route:clear',
    'php artisan config:clear',
    'php artisan view:clear'
]

[start]
cmd = 'php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT --no-reload'
