[phases.setup]
nixPkgs = ['php82', 'php82Packages.composer', 'nodejs_20']

[phases.install]
cmds = ['composer install --no-dev --optimize-autoloader']

[phases.build]
cmds = [
    'npm install',
    'npm run build',
    'php artisan config:clear',
    'php artisan route:clear', 
    'php artisan view:clear'
]

[start]
cmd = 'bash start.sh'
